services:
  db:
    image: postgres:16
    container_name: health_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: health_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  server:
    build:
      context: ./server
    container_name: health_ai_server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/health_ai_db
      JWT_SECRET: change_this_secret
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  client:
    build:
      context: ./client
    container_name: health_ai_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
